language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - dev
  path_instructions:
    - path: "src/pipeline/**"
      instructions: "LLM pipeline code — check for prompt injection risks, verify JSON schema required arrays match Zod schemas, ensure model fallback chains are respected."
    - path: "src/routes/**"
      instructions: "Elysia routes — verify auth guards (requireAuth), credential threading (resolveAllCodexCredentials), and that no route exposes raw errors to clients."
    - path: "src/etapi/**"
      instructions: "ETAPI client — check timeout handling, credential usage, and that all functions thread credentials rather than using global state."
    - path: "prisma/**"
      instructions: "Database schema — verify all user-facing models have userId column for multi-tenancy scoping."
chat:
  auto_reply: true
