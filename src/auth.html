<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllKnower - Archive Sanctum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=UnifrakturMaguntia&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --card-bg: rgba(18, 14, 12, 0.7);
            --gold-primary: #d4af37;
            --gold-glow: #f2cc8f;
            --gold-dark: #8b4513;
            --text-main: #f5f5dc;
            --text-muted: rgba(245, 245, 220, 0.6);
            --border: rgba(212, 175, 55, 0.2);
            --error: #ff5f5f;
            --success: #52ffaa;
            --loading: #ffd700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Crimson Pro', serif;
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Mystical Background --- */
        .ambient-glow {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 69, 19, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 1) 0%, transparent 100%);
            z-index: -2;
        }

        .canvas-bg {
            position: absolute;
            inset: 0;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: var(--gold-glow);
            border-radius: 50%;
            opacity: 0;
            filter: blur(1px);
        }

        @keyframes floatParticle {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }

        /* --- Auth Card --- */
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(139, 69, 19, 0.1);
            position: relative;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 20px;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, var(--gold-dark), transparent, var(--gold-dark));
            border-radius: 14px;
            z-index: -1;
            opacity: 0.3;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 3.5rem;
            margin-bottom: 4px;
            background: linear-gradient(to bottom, var(--gold-glow), var(--gold-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .header p {
            color: var(--text-muted);
            font-style: italic;
            font-size: 1rem;
        }

        /* --- Form Elements --- */
        .form-container {
            position: relative;
            overflow: hidden;
            min-height: 320px;
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.5s ease forwards;
        }

        .auth-form.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold-primary);
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        .input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 6px;
            padding: 12px 14px;
            color: white;
            font-family: 'Crimson Pro', serif;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .input:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gold-primary);
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .submit-btn {
            background: linear-gradient(135deg, #1e1510 0%, #3e2a1d 100%);
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 14px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            background: var(--gold-primary);
            color: black;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-glow {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .submit-btn:hover .btn-glow {
            transform: translateX(100%);
        }

        /* --- Status Messages --- */
        .status-msg {
            text-align: center;
            font-size: 0.95rem;
            min-height: 22px;
            transition: color 0.3s;
        }

        .status-error { color: var(--error); }
        .status-success { color: var(--success); }
        .status-loading { color: var(--loading); font-style: italic; }
        .status-sync { color: var(--gold-glow); font-weight: bold; animation: pulse 2s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* --- Token Display --- */
        .token-display {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px dashed var(--gold-primary);
            border-radius: 6px;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .token-display.visible {
            display: block;
        }

        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .token-header span {
            font-size: 0.8rem;
            color: var(--gold-glow);
            font-weight: bold;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--gold-primary);
            color: black;
        }

        .token-area {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: var(--gold-glow);
            font-family: monospace;
            font-size: 0.8rem;
            resize: none;
            outline: none;
        }

        /* --- Toggle Area --- */
        .switch-auth {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .switch-auth a {
            color: var(--gold-primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }

        .switch-auth a:hover {
            border-color: var(--gold-primary);
        }

        /* --- Utilities --- */
        .decoration-runes {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            color: rgba(212, 175, 55, 0.15);
            font-size: 1.2rem;
            pointer-events: none;
        }

        .rune {
            animation: runePulse 4s infinite ease-in-out;
        }

        @keyframes runePulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="canvas-bg"></div>
    <div class="particles" id="particles"></div>

    <main class="auth-card" id="authCard">
        <header class="header">
            <h1 id="mainTitle">AllKnower</h1>
            <p id="subTitle">Seeker of the Ancient Reach</p>
        </header>

        <div class="form-container">
            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label class="label">Arcane Contact</label>
                    <div class="input-wrapper">
                        <input type="email" class="input" placeholder="scribe@allreach.lore" required id="loginEmail">
                    </div>
                </div>
                <div class="form-group">
                    <label class="label">Secret Incantation</label>
                    <div class="input-wrapper">
                        <input type="password" class="input" placeholder="••••••••" required id="loginPass">
                        <button type="button" class="toggle-password" onclick="togglePass('loginPass')">👁️</button>
                    </div>
                </div>
                <div id="loginStatus" class="status-msg"></div>
                <button type="submit" class="submit-btn" id="loginBtn">
                    Open the Archives
                    <div class="btn-glow"></div>
                </button>
                
                <div id="tokenDisplay" class="token-display">
                    <div class="token-header">
                        <span>BEARER SIGIL</span>
                        <button type="button" class="copy-btn" id="copyBtn">COPY</button>
                    </div>
                    <textarea class="token-area" readonly id="tokenArea"></textarea>
                    <div style="margin-top: 15px; text-align: center;">
                        <a href="/reference" class="small-btn" style="text-decoration: none; display: inline-block; color: var(--gold-primary); border: 1px solid var(--gold-primary); padding: 5px 15px; border-radius: 4px; font-size: 0.8rem; font-family: 'Inter', sans-serif;">Go to API Docs</a>
                    </div>
                </div>

                <div class="switch-auth">
                    New disciple? <a href="/register" onclick="route(event)">Claim your sigil</a>
                </div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label class="label">Chosen Name</label>
                    <div class="input-wrapper">
                        <input type="text" class="input" placeholder="Elara the Wise" required id="regName">
                    </div>
                </div>
                <div class="form-group">
                    <label class="label">Arcane Contact</label>
                    <div class="input-wrapper">
                        <input type="email" class="input" placeholder="scribe@allreach.lore" required id="regEmail">
                    </div>
                </div>
                <div class="form-group">
                    <label class="label">Secret Incantation</label>
                    <div class="input-wrapper">
                        <input type="password" class="input" placeholder="••••••••" required id="regPass" minlength="8">
                        <button type="button" class="toggle-password" onclick="togglePass('regPass')">👁️</button>
                    </div>
                </div>
                <div id="regStatus" class="status-msg"></div>
                <button type="submit" class="submit-btn" id="regBtn">
                    Bind Your Soul
                    <div class="btn-glow"></div>
                </button>
                <div class="switch-auth">
                    Already bound? <a href="/login" onclick="route(event)">Log in to Archives</a>
                </div>
            </form>
        </div>

        </div>

        <!-- Sync Progress (Overlay) -->
        <div id="syncOverlay" style="display: none; position: absolute; inset: 0; background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 12px; z-index: 50; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; border: 1px solid var(--gold-primary);">
            <header class="header">
                <h1>AllKnower</h1>
                <p class="status-sync" id="syncStatus">Transferring Sigil to Portal...</p>
            </header>
            <div class="decoration-runes" style="margin-top: 40px;">
                <span class="rune">ᛟ</span>
                <span class="rune" style="animation-delay: 0.3s">ᛗ</span>
                <span class="rune" style="animation-delay: 0.6s">ᛚ</span>
            </div>
            <p id="syncDetail" style="margin-top: 30px; font-size: 0.9rem; color: var(--text-muted);">Please do not close this scroll.</p>
        </div>
    </main>

    <script>
        // --- Navigation Logic ---
        function updateView(targetPath) {
            const path = targetPath || window.location.pathname;
            const isLogin = path.endsWith('/login');
            const card = document.getElementById('authCard');
            const loginForm = document.getElementById('loginForm');
            const regForm = document.getElementById('registerForm');
            const subTitle = document.getElementById('subTitle');

            // Apply slight "shake" or bounce on change
            card.style.transform = 'scale(0.98)';
            setTimeout(() => card.style.transform = 'scale(1)', 100);

            if (isLogin) {
                loginForm.classList.add('active');
                regForm.classList.remove('active');
                subTitle.textContent = "Claim your bearer sigil";
                document.title = "AllKnower - Login";
            } else {
                loginForm.classList.remove('active');
                regForm.classList.add('active');
                subTitle.textContent = "Join the ancient order of lore";
                document.title = "AllKnower - Register";
            }
        }

        function route(e) {
            e.preventDefault();
            const url = e.currentTarget.getAttribute('href');
            try {
                window.history.pushState({}, '', url);
            } catch (err) {
                console.warn("Navigation limited by protocol (likely file://). Updating view only.");
            }
            updateView(url);
        }

        window.onpopstate = updateView;

        // --- Portal Sync Logic ---
        let syncParams = { url: null, redirect: null, verified: false };

        async function initPortalSync() {
            const params = new URLSearchParams(window.location.search);
            const syncUrl = params.get('portalSyncUrl');
            if (!syncUrl) return;

            syncParams.url = syncUrl;
            syncParams.redirect = params.get('redirectUrl');

            try {
                const res = await fetch('/api/auth/config');
                const { portalSyncWhitelist } = await res.json();
                
                const origin = new URL(syncUrl).origin;
                if (portalSyncWhitelist.includes(origin)) {
                    syncParams.verified = true;
                    console.info("Portal sync verified for:", origin);
                } else {
                    console.warn("Portal sync origin not whitelisted:", origin);
                }
            } catch (err) {
                console.error("Failed to verify portal sync:", err);
            }
        }

        async function performPortalSync(token, userData) {
            if (!syncParams.verified) return;

            const overlay = document.getElementById('syncOverlay');
            const detail = document.getElementById('syncDetail');
            overlay.style.display = 'flex';

            try {
                const res = await fetch(syncParams.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, user: userData })
                });

                if (!res.ok) throw new Error("Portal rejected the sigil.");

                detail.textContent = "Sync complete. Returning you to the Portal...";
                
                setTimeout(() => {
                    if (syncParams.redirect) {
                        window.location.href = syncParams.redirect;
                    } else {
                        // Default to just going back to the origin
                        window.location.href = new URL(syncParams.url).origin;
                    }
                }, 1500);

            } catch (err) {
                detail.textContent = "Sync failed: " + err.message;
                detail.style.color = 'var(--error)';
                setTimeout(() => overlay.style.display = 'none', 3000);
            }
        }

        // --- Background Particles ---
        function initParticles() {
            const container = document.getElementById('particles');
            const count = 30;
            for(let i=0; i<count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 3 + 1 + 'px';
                p.style.width = size;
                p.style.height = size;
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + 20 + '%';
                p.style.animation = `floatParticle ${Math.random() * 10 + 10}s linear infinite`;
                p.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(p);
            }
        }

        // --- UI Interactions ---
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function setStatus(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = `status-msg status-${type}`;
        }

        // --- Auth API Handlers ---
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;
            const btn = document.getElementById('loginBtn');
            const statusId = 'loginStatus';


            btn.disabled = true;
            setStatus(statusId, "Consulting the archive wards...", "loading");
            
            try {
                const res = await fetch('/api/auth/sign-in/email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok) throw new Error(data.message || "Archive denied access.");

                // Attempt to get token
                let token = res.headers.get('set-auth-token');
                if (!token) {
                    const tRes = await fetch('/api/auth/token', { credentials: 'include' });
                    const tData = await tRes.json();
                    token = tData?.token;
                }

                if (!token) throw new Error("Authenticated, but sigil missing.");

                // Check for portal sync
                if (syncParams.verified) {
                    await performPortalSync(token, data.user || { email });
                    return;
                }

                setStatus(statusId, "Arcane seal broken. Your sigil is below.", "success");
                const disp = document.getElementById('tokenDisplay');
                const area = document.getElementById('tokenArea');
                area.value = token;
                disp.classList.add('visible');

            } catch (err) {
                setStatus(statusId, err.message, "error");
            } finally {
                btn.disabled = false;
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            const btn = document.getElementById('regBtn');
            const statusId = 'regStatus';

            btn.disabled = true;
            setStatus(statusId, "Etching your soul into the grimoire...", "loading");

            try {
                const res = await fetch('/api/auth/sign-up/email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.message || "Ritual failed.");

                setStatus(statusId, "Success. You are now bound. Redirecting to gates...", "success");
                setTimeout(() => {
                    window.history.pushState({}, '', '/login');
                    updateView();
                }, 1500);

            } catch (err) {
                setStatus(statusId, err.message, "error");
            } finally {
                btn.disabled = false;
            }
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', async () => {
            initParticles();
            await initPortalSync();
            updateView();
            document.getElementById('loginForm').onsubmit = handleLogin;
            document.getElementById('registerForm').onsubmit = handleRegister;
            document.getElementById('copyBtn').onclick = () => {
                const area = document.getElementById('tokenArea');
                area.select();
                navigator.clipboard.writeText(area.value);
                document.getElementById('copyBtn').textContent = 'COPIED!';
                setTimeout(() => document.getElementById('copyBtn').textContent = 'COPY', 2000);
            };
        });
    </script>
</body>
</html>
