name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: allknower
          POSTGRES_PASSWORD: allknower
          POSTGRES_DB: allknower
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U allknower"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://allknower:allknower@localhost:5433/allknower
      NODE_ENV: test
      BETTER_AUTH_SECRET: ci-test-secret-minimum-16-chars
      OPENROUTER_API_KEY: sk-or-ci-dummy-key
      ALLCODEX_ETAPI_TOKEN: ci-dummy-etapi-token
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Run migrations
        run: bunx prisma migrate deploy
      - name: Typecheck
        run: bun typecheck
      - name: Test
        run: bun run check

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
