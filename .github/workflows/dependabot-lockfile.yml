name: Dependabot Lockfile Fix
on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          # PAT (not GITHUB_TOKEN) so the lockfile commit re-triggers required CI checks
          token: ${{ secrets.LOCKFILE_PAT }}

      - name: Checkout PR branch by SHA
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: git checkout -B "$HEAD_REF"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - run: bun install --no-frozen-lockfile

      - name: Commit updated lockfile
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git diff --cached --quiet || git commit -m "chore: regenerate bun.lock for dependabot update"
          git push origin "HEAD:$HEAD_REF"
