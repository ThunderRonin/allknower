sonar.projectKey=ThunderRonin_allknower
sonar.organization=thunderronin

sonar.sources=src
sonar.tests=test
sonar.test.inclusions=**/*.test.ts,test/**/*

# Exclude test files from copy-paste detection — Bun mock.module() requires
# each test file to independently declare full mock surfaces, making mock
# boilerplate duplication a structural requirement (not a code smell).
sonar.cpd.exclusions=**/*.test.ts,test/**/*

sonar.exclusions=node_modules/**,prisma/migrations/**,docs/**,bun.lock
